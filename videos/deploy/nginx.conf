# Reverse proxy nginx para o VideoDoc Engine.
# Coloque em /etc/nginx/sites-available/videodoc e crie symlink em sites-enabled.
# Depois rode certbot para HTTPS:  sudo certbot --nginx -d seu-dominio.com

server {
    listen 80;
    server_name seu-dominio.com;

    # Permite upload de vídeos grandes (alinhado ao limite de 500MB do multer)
    client_max_body_size 550M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Transcrição pode demorar — timeouts generosos
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }
}
