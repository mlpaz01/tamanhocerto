# Trecho Nginx para servir o VideoDoc em tamanhocerto.com.br/videos
# Cole este bloco location DENTRO do server { } existente de tamanhocerto.com.br
# (o mesmo server que já tem o certificado SSL do domínio).
#
# A barra final no proxy_pass FAZ O STRIP do prefixo /videos:
#   navegador  -> tamanhocerto.com.br/videos/api/trpc
#   app recebe -> /api/trpc
# Isso casa com VITE_BASE_PATH=/videos/ usado no build.

location /videos/ {
    proxy_pass http://127.0.0.1:3012/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Uploads de vídeo grandes
    client_max_body_size 550M;

    # Transcrição/geração podem demorar
    proxy_read_timeout 1800s;
    proxy_send_timeout 1800s;
}

# Redireciona /videos -> /videos/ (evita 404 ao acessar sem a barra)
location = /videos {
    return 301 /videos/;
}
